name: Refresh Agendas

# Scheduled run of the full pipeline:
#   scrape -> parse (Haiku) -> synthesize (Sonnet) -> archive ->
#   refresh dashboard chrome -> update cities.json -> commit & push.
#
# `--all` loops over every registered CityAdapter so adding a new city
# is purely additive: register the adapter, drop in branding/{slug}.json,
# and the next cron picks it up.
#
# Defaults to a once-daily run at 10:00 UTC (6 AM ET in winter, 5 AM ET
# during DST). Adjust the cron below if you want a different cadence.
# Idle days (no new meetings) are essentially free: a few HTTP GETs to
# each city's calendar plus a no-op Synthesizer step. LLM cost is
# bounded by new-meeting count.

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}  # allow manual run from the Actions tab

# One scheduled refresh at a time. If a run is in progress and a manual
# dispatch fires, queue the new one rather than cancel the running one.
concurrency:
  group: refresh-agendas
  cancel-in-progress: false

# The default GITHUB_TOKEN needs write access to push the regenerated
# per-city agendas.json + archived sources + cities.json back to main.
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25  # higher ceiling now that we loop over cities

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline for every registered city
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m scraper.run_pipeline --process --all

      - name: Upload run summaries + raw calendar responses (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-run-summaries
          # Each city writes its own forensic outputs under agendas/{slug}/:
          #   .last_scraper_run.json           (run summary)
          #   .last_calendar_responses/*.html  (raw HTML per probe)
          # All filenames begin with a dot, so include-hidden-files is
          # essential — without it, upload-artifact silently drops them.
          path: |
            agendas/*/.last_scraper_run.json
            agendas/*/.last_calendar_responses/**
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 30

      - name: Commit and push if anything changed
        run: |
          set -euo pipefail
          git config user.name "municipal-dashboard-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage everything the pipeline can produce or refresh:
          #   - per-city directories (index.html, agendas.json, branding.json,
          #     archived/), one per registered slug
          #   - the root cities.json registry
          # We use a glob-style add of every committed top-level dir that
          # contains an agendas.json. That covers Medford today, Somerville
          # next, etc., without having to enumerate slugs in this workflow.
          for d in */; do
            if [ -f "${d}agendas.json" ]; then
              git add "$d"
            fi
          done
          git add cities.json

          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi

          # Summarize the diff for the commit message.
          CITIES_TOUCHED=$(git diff --cached --name-only \
                           | awk -F/ '/^[^.]+\/agendas\.json$/{print $1}' \
                           | sort -u | paste -sd, -)
          NEW_ARCHIVED=$(git diff --cached --name-only \
                         | grep -E '^[^/]+/archived/' | wc -l)

          git commit -m "chore(agendas): scheduled refresh $(date -u +%F)" \
                     -m "Cities touched: ${CITIES_TOUCHED:-(none)}" \
                     -m "Newly archived files: ${NEW_ARCHIVED}"

          git push origin HEAD:main
